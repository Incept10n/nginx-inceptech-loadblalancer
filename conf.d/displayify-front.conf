server {
    listen 80;
    server_name displayify.inceptech.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name displayify.inceptech.ru;

    ssl_certificate /etc/nginx/pki/server.crt;
    ssl_certificate_key /etc/nginx/pki/server.key;
    ssl_client_certificate /etc/nginx/pki/ca.crt;
    ssl_verify_client on;

    location / {
        proxy_pass http://frontend.displayify.svc.cluster.local:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}