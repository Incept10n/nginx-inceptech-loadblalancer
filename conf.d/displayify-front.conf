server {
    listen 80;
    server_name displayify.ru www.displayify.ru;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name displayify.ru www.displayify.ru;

    proxy_pass frontend.displayify.svc.cluster.local:443;
    proxy_timeout 1h;
    proxy_connect_timeout 10s;

    ssl_certificate /etc/nginx/pki/server.crt;
    ssl_certificate_key /etc/nginx/pki/server.key;
    ssl_client_certificate /etc/nginx/pki/ca.crt;
    ssl_verify_client on;
    
    location / {
	    try_files $uri $uri/ =404;
    }
}