# Upstream using the K8s Service URL
upstream ts3_query_upstream {
    server ts3-service.default.svc.cluster.local:10011;
}

upstream ts3_filetransfer_upstream {
    server ts3-service.default.svc.cluster.local:30033;
}

# UDP Upstream for Voice
upstream ts3_voice_upstream {
    server ts3-service.default.svc.cluster.local:9987;
}

# ServerQuery Proxy
server {
    listen 10011;
    proxy_pass ts3_query_upstream;
    proxy_timeout 3s;
    proxy_connect_timeout 3s;
}

# FileTransfer Proxy
server {
    listen 30033;
    proxy_pass ts3_filetransfer_upstream;
}

# Voice Proxy (UDP)
server {
    listen 9987 udp;
    proxy_pass ts3_voice_upstream;
    # UDP timeout is important for VoIP
    proxy_timeout 1h; 
    proxy_responses 1;
}
