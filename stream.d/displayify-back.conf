# RTMPS
upstream mediamtx_rtmps {
  server mediamtx.displayify.svc.cluster.local:1936;
}

# WebRTC HTTP
upstream mediamtx_webrtc_http {
  server mediamtx.displayify.svc.cluster.local:8889;
}

# WebRTC UDP
upstream mediamtx_webrtc_udp {
  server mediamtx.displayify.svc.cluster.local:8189;
}

server {
  listen 1936;
  proxy_pass mediamtx_rtmps;
  proxy_timeout 1h;
  proxy_connect_timeout 10s;
}

server {
  listen 8889;
  proxy_pass mediamtx_webrtc_http;
  proxy_timeout 1h;
  proxy_connect_timeout 10s;
}

server {
  listen 8189 udp;
  proxy_pass mediamtx_webrtc_udp;
  proxy_timeout 1h;
  proxy_responses 0;
}
